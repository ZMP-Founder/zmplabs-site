    <link rel="stylesheet" type="text/css" href="styles.css">
    <style>
        .contact-header-white { color: #ffffff !important; font-weight: 600 !important; }
        .social-link-item { color: #0dcaf0 !important; text-decoration: none; transition: color 0.2s ease; }
        .social-link-item:hover { color: #ffffff !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-white fs-4" href="index.html">ZMPLabs</a>
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="education.html">Education</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="workflows.html">Workflows</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="newsletter.html">Newsletter</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="partners.html">Partners</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="sponsors.html">Sponsors</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold text-white">Contact ZMPLabs</h1>
            <p class="lead">We’d love to hear from you.</p>
        </div>
        
        <div class="row g-4">
            <div class="col-lg-6">
                <div class="contact-box h-100">
                    <h2 class="h5 text-white mb-4">General Inquiry</h2>
                    <input type="text" placeholder="Your name" class="form-control mb-3">
                    <input type="email" placeholder="Your email" class="form-control mb-3">
                    <textarea placeholder="Your message" class="form-control mb-3" rows="4"></textarea>
                    <button class="btn btn-outline-info w-100 py-3 text-uppercase fw-bold">Send Message</button>
                </div>
            </div>
            
            <div class="col-lg-6">
                <div class="contact-box h-100 d-flex flex-column justify-content-center p-4">
                    <div class="mb-4 pb-2">
                        <h3 class="h5 contact-header-white mb-2"><i class="bi bi-envelope-at me-2 text-info"></i>Sponsor Inquiry</h3>
                        <p class="fs-5 text-info mb-0">supportteam@zmplabs.com</p>
                    </div>
                    
                    <div>
                        <h3 class="h5 contact-header-white mb-3"><i class="bi bi-share me-2 text-info"></i>Connect With Us</h3>
                        <ul class="list-unstyled fs-5 lh-lg">
                            <li class="mb-2">
                                <i class="bi bi-newspaper me-2 text-secondary"></i>
                                <a href="https://substack.com/@zmplabs" target="_blank" class="social-link-item">Substack: @zmplabs</a>
                            </li>
                            <li class="mb-2">
                                <i class="bi bi-facebook me-2 text-secondary"></i>
                                <a href="https://www.facebook.com/profile.php?id=61570726530489" target="_blank" class="social-link-item">Facebook: ZMPLabs</a>
                            </li>
                            <li class="mb-2">
                                <i class="bi bi-linkedin me-2 text-secondary"></i>
                                <a href="https://linkedin.com" target="_blank" class="social-link-item">LinkedIn: @zmplabs</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

</html>
